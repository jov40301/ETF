<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>20 日跌幅統計（近 1 / 3 / 5 年）</title>
  <meta name="color-scheme" content="light dark" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="wrap">
    <header class="header">
      <div class="title">
        <h1>20 日跌幅統計（近 1 / 3 / 5 年）</h1>
      </div>
    </header>

    <div class="grid">
      <section class="card">
        <h2>查詢</h2>

        <div class="form">
          <div class="input" title="輸入代號">
            <span class="mono dim">⌁</span>
            <input id="symbol" placeholder="例如：0050.TW 或 VOO" autocomplete="off" spellcheck="false" />
          </div>
          <button class="btn" id="go">查詢</button>
        </div>

        <div class="help">
          <p>
            台股要加「.TW」，例如： <span class="mono">0050.TW</span><br/>
            美股直接輸入股票代號，例如： <span class="mono">VOO</span>
          </p>
        </div>

        <!-- 三年期結果：1y / 3y / 5y -->
        <div class="yearGrid">
          <!-- 1Y -->
          <div class="yearCard">
            <div class="yearHeader">
              <div class="yearTitle">近 1 年</div>
              <div class="badge" id="badge-1y">—</div>
            </div>

            <div class="kpiRow">
              <div class="kpi">
                <div class="label">≤ -5%（相對 20 日前）</div>
                <div class="value" id="c5-1y">—</div>
                <div class="sub">平均成交價：<span id="a5-1y">—</span></div>
              </div>

              <div class="kpi">
                <div class="label">≤ -10%（相對 20 日前）</div>
                <div class="value" id="c10-1y">—</div>
                <div class="sub">平均成交價：<span id="a10-1y">—</span></div>
              </div>
            </div>
          </div>

          <!-- 3Y -->
          <div class="yearCard">
            <div class="yearHeader">
              <div class="yearTitle">近 3 年</div>
              <div class="badge" id="badge-3y">—</div>
            </div>

            <div class="kpiRow">
              <div class="kpi">
                <div class="label">≤ -5%（相對 20 日前）</div>
                <div class="value" id="c5-3y">—</div>
                <div class="sub">平均成交價：<span id="a5-3y">—</span></div>
              </div>

              <div class="kpi">
                <div class="label">≤ -10%（相對 20 日前）</div>
                <div class="value" id="c10-3y">—</div>
                <div class="sub">平均成交價：<span id="a10-3y">—</span></div>
              </div>
            </div>
          </div>

          <!-- 5Y -->
          <div class="yearCard">
            <div class="yearHeader">
              <div class="yearTitle">近 5 年</div>
              <div class="badge" id="badge-5y">—</div>
            </div>

            <div class="kpiRow">
              <div class="kpi">
                <div class="label">≤ -5%（相對 20 日前）</div>
                <div class="value" id="c5-5y">—</div>
                <div class="sub">平均成交價：<span id="a5-5y">—</span></div>
              </div>

              <div class="kpi">
                <div class="label">≤ -10%（相對 20 日前）</div>
                <div class="value" id="c10-5y">—</div>
                <div class="sub">平均成交價：<span id="a10-5y">—</span></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Meta -->
        <div class="meta">
          <div class="metaItem">
            <div class="k">資料區間</div>
            <div class="v" id="range">—</div>
          </div>
          <div class="metaItem">
            <div class="k">資料筆數（交易日）</div>
            <div class="v" id="points">—</div>
          </div>
          <div class="metaItem">
            <div class="k">資料源</div>
            <div class="v" id="source">—</div>
          </div>
          <div class="metaItem">
            <div class="k">更新時間</div>
            <div class="v" id="generatedAt">—</div>
          </div>
        </div>

        <div class="status" id="status">狀態：等待查詢</div>
      </section>
    </div>
  </div>

  <script src="./app.js"></script>
</body>

</html>
